<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebAR 最终尝试</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
</head>
<body style="margin: 0; background: #000;">

    <model-viewer 
        src="bird-v18.glb" 
        ar 
        ar-modes="webxr" 
        camera-controls 
        autoplay 
        style="width: 100%; height: 100vh;"
    >
        <div slot="poster" style="color: white; text-align: center; padding-top: 50vh;">
            如果长时间黑屏，说明网络拉不动模型...
        </div>
        
        <button slot="ar-button" style="position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); padding: 15px 30px; background: #ffcc00; border: none; border-radius: 10px; font-weight: bold;">
            📍 点击尝试进入 AR
        </button>
    </model-viewer>

</body>
</html>
