<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebAR 鸟类 - 强力加载版</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #000; }
        model-viewer { width: 100%; height: 100vh; }
        #overlay {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            width: 85%; background: rgba(0,0,0,0.8); color: #00ff00;
            padding: 15px; border-radius: 12px; font-family: monospace; z-index: 1000;
        }
        #bar-container { width: 100%; background: #333; height: 10px; margin-top: 10px; border-radius: 5px; overflow: hidden; }
        #bar { width: 0%; height: 100%; background: #00ff00; transition: width 0.2s; }
        .ar-btn {
            display: none; position: absolute; top: 20px; right: 20px;
            padding: 12px 24px; background: white; border: none; border-radius: 30px;
            font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 1001;
        }
    </style>
</head>
<body>

    <button id="ar-btn" class="ar-btn" onclick="triggerAR()">✨ 开启 AR 空间</button>

    <model-viewer id="bird" ar ar-modes="webxr scene-viewer quick-look" camera-controls autoplay shadow-intensity="1">
        <div id="overlay">
            <div id="msg">准备建立连接...</div>
            <div id="bar-container"><div id="bar"></div></div>
            <div id="log" style="font-size: 10px; color: #888; margin-top: 8px;">等待请求响应...</div>
        </div>
    </model-viewer>

    <script>
        const modelViewer = document.querySelector('#bird');
        const msg = document.querySelector('#msg');
        const bar = document.querySelector('#bar');
        const log = document.querySelector('#log');
        const btn = document.querySelector('#ar-btn');

        const MODEL_URL = 'bird-v18.glb';

        async function downloadModel() {
            try {
                log.innerText = "正在尝试连接 GitHub 节点...";
                const response = await fetch(MODEL_URL);
                
                if (!response.ok) throw new Error(`服务器拒绝访问: ${response.status}`);

                const reader = response.body.getReader();
                const contentLength = +response.headers.get('Content-Length');
                
                if (!contentLength) {
                    log.innerText = "提示：无法获取文件大小，正在静默下载...";
                }

                let receivedLength = 0;
                let chunks = []; 
                
                while(true) {
                    const {done, value} = await reader.read();
                    if (done) break;
                    chunks.push(value);
                    receivedLength += value.length;
                    
                    if (contentLength) {
                        const step = Math.round((receivedLength / contentLength) * 100);
                        bar.style.width = step + '%';
                        msg.innerText = `正在捕获鸟儿: ${step}%`;
                    }
                    log.innerText = `已接收: ${(receivedLength/1024/1024).toFixed(2)} MB`;
                }

                msg.innerText = "下载完成！正在注入 3D 引擎...";
                const blob = new Blob(chunks);
                const objectURL = URL.createObjectURL(blob);
                modelViewer.src = objectURL; // 将下载好的本地二进制流塞给组件
                
                modelViewer.addEventListener('load', () => {
                    msg.innerText = "✅ 鸟儿已成功降落！";
                    btn.style.display = "block";
                });

            } catch (err) {
                msg.innerText = "❌ 连接中断";
                log.innerText = "原因: " + err.message + "\n建议：请尝试切换手机流量或使用网络加速工具。";
                console.error(err);
            }
        }

        function triggerAR() {
            modelViewer.activateAR();
        }

        // 页面加载后立即开始强力下载
        window.onload = downloadModel;
    </script>
</body>
</html>
