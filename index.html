<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebAR 鸟类 - 极简加速版</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #222; }
        model-viewer { width: 100%; height: 100vh; }
        
        /* 强制显示的 AR 按钮 */
        .ar-btn {
            position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%);
            padding: 15px 30px; background: #007bff; color: white; border: none;
            border-radius: 50px; font-weight: bold; font-size: 18px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5); z-index: 9999;
        }
        #loading-text {
            position: absolute; top: 20px; left: 20px; color: #aaa; font-size: 12px; pointer-events: none;
        }
    </style>
</head>
<body>

    <button class="ar-btn" onclick="forceAR()">✨ 开启 AR 空间 (强制模式)</button>
    <div id="loading-text">正在通过 CDN 同步模型...</div>

    <model-viewer 
        id="bird" 
        src="https://cdn.jsdelivr.net/gh/plldai/bird-AR@main/bird-v18.glb" 
        ar 
        ar-modes="scene-viewer webxr quick-look" 
        camera-controls 
        autoplay 
        shadow-intensity="1"
        camera-orbit="auto auto auto"
        min-camera-orbit="auto auto auto"
        max-camera-orbit="auto auto auto"
    >
    </model-viewer>

    <script>
        const modelViewer = document.querySelector('#bird');
        const loadText = document.querySelector('#loading-text');

        // 监听加载成功
        modelViewer.addEventListener('load', () => {
            loadText.innerText = "✅ 模型已成功就绪";
            loadText.style.color = "#00ff00";
        });

        // 监听加载错误
        modelViewer.addEventListener('error', (e) => {
            loadText.innerText = "❌ 解析失败，尝试刷新。错误:" + e.detail.type;
        });

        function forceAR() {
            // 尝试直接激活 AR，不等 load 事件
            modelViewer.activateAR();
        }
    </script>
</body>
</html>
